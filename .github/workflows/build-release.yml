name: Build and Release Chrome Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Existing tag to publish, for example v1.0.0'
        required: true
      release_name:
        description: 'Optional release title. Defaults to the tag name.'
        required: false
      prerelease:
        description: 'Mark the release as a prerelease'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-extension:
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_KEY: ${{ secrets.CHROME_EXTENSION_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: HUSKY=0 pnpm install --frozen-lockfile --ignore-scripts

      - name: Validate extension signing key
        run: node app/chrome-extension/scripts/verify-extension-key.mjs

      - name: Prepare WXT
        run: pnpm --filter chrome-mcp-server exec wxt prepare

      - name: Build shared packages
        run: pnpm run build:shared

      - name: Build wasm bundle
        run: pnpm run build:wasm

      - name: Package Chrome extension
        run: pnpm --filter chrome-mcp-server zip

      - name: Validate packaged manifest
        run: node app/chrome-extension/scripts/verify-extension-key.mjs --manifest app/chrome-extension/.output/chrome-mv3/manifest.json

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
            RELEASE_NAME="${{ github.event.inputs.release_name }}"
            if [[ -z "${RELEASE_NAME}" ]]; then
              RELEASE_NAME="${TAG_NAME}"
            fi
            PRERELEASE="${{ github.event.inputs.prerelease }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="${TAG_NAME}"
            PRERELEASE="false"
          fi

          ASSET_NAME="chrome-mcp-server-${TAG_NAME}.zip"
          shopt -s nullglob
          ZIP_FILES=(app/chrome-extension/.output/*.zip)
          if [[ "${#ZIP_FILES[@]}" -ne 1 ]]; then
            echo "Expected exactly one zip artifact in app/chrome-extension/.output, found ${#ZIP_FILES[@]}"
            ls -la app/chrome-extension/.output
            exit 1
          fi

          cp "${ZIP_FILES[0]}" "app/chrome-extension/.output/${ASSET_NAME}"

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "asset_name=${ASSET_NAME}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.asset_name }}
          path: app/chrome-extension/.output/${{ steps.meta.outputs.asset_name }}
          retention-days: 30

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          overwrite_files: true
          files: app/chrome-extension/.output/${{ steps.meta.outputs.asset_name }}
